<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <linearGradient id="hook" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0077ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="128" cy="128" r="118" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
  <!-- Hook shape -->
  <g filter="url(#glow)" stroke="url(#hook)" stroke-width="10" fill="none" stroke-linecap="round">
    <!-- Vertical line -->
    <line x1="128" y1="60" x2="128" y2="155"/>
    <!-- Curve at bottom -->
    <path d="M128,155 Q128,195 105,195 Q82,195 82,175 Q82,162 95,158"/>
    <!-- Barb -->
    <path d="M95,158 L82,145"/>
  </g>
  <!-- Fishing line dots -->
  <circle cx="128" cy="50" r="4" fill="#00d4ff" opacity="0.8"/>
  <circle cx="128" cy="38" r="3" fill="#00d4ff" opacity="0.5"/>
  <circle cx="128" cy="28" r="2" fill="#00d4ff" opacity="0.3"/>
  <!-- Text -->
  <text x="128" y="228" font-family="Arial Black, sans-serif" font-size="22" font-weight="900"
        fill="#ffffff" text-anchor="middle" letter-spacing="3">SHAREFY</text>
</svg>
